name: ChitChat CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build shared module
        run: mvn -N install -DskipTests --no-transfer-progress && mvn -pl shared install -DskipTests --no-transfer-progress

      - name: Build & test server module
        run: mvn -pl server test --no-transfer-progress

      - name: Package server JAR
        run: mvn -pl shared,server package -DskipTests --no-transfer-progress

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chitchat-server
          path: server/target/*.jar
          retention-days: 7

  deploy-notify:
    name: Notify Render Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Confirm deployment
        run: |
          echo "✅ Build passed — Render is auto-deploying from main branch"
          echo "🌐 Live at: https://chitchat-moy8.onrender.com"
