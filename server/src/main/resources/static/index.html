<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChitChat — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <h1 class="brand">ChitChat</h1>
    <p class="brand-sub">Connect with everyone, everywhere.</p>

    <!-- Tab switcher -->
    <div class="tab-bar">
      <button class="tab active" onclick="showTab('login')">Login</button>
      <button class="tab" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <input type="text" id="login-username" placeholder="Username" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <p id="login-error" class="error-msg"></p>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
      <div class="name-row">
        <input type="text" id="reg-fname" placeholder="First name" required />
        <input type="text" id="reg-lname" placeholder="Last name" required />
      </div>
      <input type="text" id="reg-username" placeholder="Username" required />
      <input type="password" id="reg-password" placeholder="Password" required />
      <p id="reg-error" class="error-msg"></p>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0) === (tab === 'login')));
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }

      sessionStorage.setItem('user', JSON.stringify(data));
      if(data.token) sessionStorage.setItem('jwt', data.token);
      window.location.href = 'chat.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const fname    = document.getElementById('reg-fname').value.trim();
      const lname    = document.getElementById('reg-lname').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const errEl    = document.getElementById('reg-error');
      errEl.textContent = '';

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fname, lname, username, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; return; }

      sessionStorage.setItem('user', JSON.stringify(data));
      if(data.token) sessionStorage.setItem('jwt', data.token);
      window.location.href = 'chat.html';
    }
  </script>
</body>
</html>
