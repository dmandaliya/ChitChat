<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChitChat</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="chat-page">

<!-- INCOMING CALL OVERLAY -->
<div id="call-overlay" class="call-overlay hidden">
  <div class="call-card">
    <div class="call-avatar" id="call-avatar">?</div>
    <div class="call-name" id="call-name">Someone</div>
    <div class="call-subtitle">Incoming call&hellip;</div>
    <div class="call-actions">
      <button class="btn-call-accept" onclick="acceptCall()">Accept</button>
      <button class="btn-call-reject" onclick="rejectCall()">Reject</button>
    </div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call-screen" class="call-screen hidden">
  <video id="remote-video" autoplay playsinline></video>
  <video id="local-video"  autoplay playsinline muted></video>
  <div class="call-controls">
    <span id="call-with-label" style="color:white;font-weight:600"></span>
    <button class="btn-icon-lg" onclick="toggleMute()">Mute</button>
    <button class="btn-icon-lg" onclick="toggleCamera()">Camera</button>
    <button class="btn-icon-lg" onclick="toggleScreenShare()">Screen</button>
    <button class="btn-icon-lg danger" onclick="hangUp()">End</button>
  </div>
</div>

<!-- ADD FRIEND MODAL -->
<div id="add-friend-modal" class="modal hidden">
  <div class="modal-card">
    <h3>Add Friend</h3>
    <input type="text" id="add-friend-input" placeholder="Search by username&hellip;" oninput="searchUsers(this.value)"/>
    <div id="user-search-results" class="user-search-results"></div>
    <p id="add-friend-error" class="error-msg"></p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideAddFriend()">Cancel</button>
      <button class="btn-primary" onclick="addFriend()">Add</button>
    </div>
  </div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker" class="emoji-picker hidden">
  <input type="text" id="emoji-search" class="emoji-search" placeholder="Search emojiвҖҰ" oninput="searchEmoji(this.value)"/>
  <div class="emoji-cats" id="emoji-cats"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- REACTION PICKER -->
<div id="reaction-picker" class="reaction-picker hidden">
  <span onclick="reactTo('вқӨпёҸ')">вқӨпёҸ</span>
  <span onclick="reactTo('рҹҳӮ')">рҹҳӮ</span>
  <span onclick="reactTo('рҹҳ®')">рҹҳ®</span>
  <span onclick="reactTo('рҹҳў')">рҹҳў</span>
  <span onclick="reactTo('рҹ‘Қ')">рҹ‘Қ</span>
  <span onclick="reactTo('рҹ”Ҙ')">рҹ”Ҙ</span>
</div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="sendImage(this)"/>

<!-- CHAT LAYOUT -->
<div class="chat-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="brand-small">ChitChat</span>
      <button class="btn-icon" onclick="logout()">&#x2715;</button>
    </div>
    <div class="user-info" id="user-info"></div>

    <div class="sidebar-section-title" style="display:flex;align-items:center;justify-content:space-between;padding-right:10px">
      <span>Friends</span>
      <button class="btn-new-room" onclick="showAddFriend()" title="Add friend">+</button>
    </div>
    <ul id="user-list" class="user-list"></ul>

    <div class="sidebar-section-title" style="display:flex;align-items:center;justify-content:space-between;padding-right:10px">
      <span>Chats</span>
      <button class="btn-new-room" onclick="showCreateRoom()">+</button>
    </div>
    <ul id="room-list" class="user-list"></ul>
  </aside>

  <main class="chat-main">
    <div class="chat-header" id="chat-header">
      <div id="chat-header-info" style="display:flex;flex-direction:column;gap:2px">
        <span id="chat-header-name">Select a conversation</span>
        <span id="chat-header-status" class="chat-header-status"></span>
      </div>
    </div>
    <div id="typing-indicator" class="typing-indicator hidden"></div>
    <div class="messages" id="messages"></div>
    <form class="message-bar" onsubmit="sendMessage(event)">
      <button type="button" class="btn-attach" onclick="document.getElementById('img-input').click()" title="Send image">рҹ“Һ</button>
      <button type="button" class="btn-emoji" onclick="toggleEmojiPicker(event)" title="Emoji">рҹҳҠ</button>
      <input type="text" id="msg-input" placeholder="Type a message&hellip;" autocomplete="off" oninput="onTyping()"/>
      <button type="submit" class="btn-send">Send</button>
    </form>
  </main>
</div>

<!-- Create room modal -->
<div id="room-modal" class="modal hidden">
  <div class="modal-card">
    <h3>New Chat</h3>
    <input type="text" id="room-name" placeholder="Chat name"/>
    <p style="font-size:.82rem;color:var(--text-muted);margin:8px 0 4px">Add friends:</p>
    <div id="room-friends-list" style="max-height:160px;overflow-y:auto;border:1px solid var(--gray);border-radius:8px;padding:6px 10px;margin-bottom:6px"></div>
    <p id="room-error" class="error-msg"></p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideCreateRoom()">Cancel</button>
      <button class="btn-primary"   onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

var currentEmojiCat=0;

function buildEmojiPicker(){
  var catsEl=document.getElementById('emoji-cats');
  var gridEl=document.getElementById('emoji-grid');
  catsEl.innerHTML='';
  EMOJI_CATS.forEach(function(cat,i){
    var btn=document.createElement('button');
    btn.type='button';
    btn.className='emoji-cat-btn'+(i===currentEmojiCat?' active':'');
    btn.title=cat.label;
    btn.textContent=cat.icon;
    btn.onclick=function(){currentEmojiCat=i;buildEmojiGrid();document.querySelectorAll('.emoji-cat-btn').forEach(function(b,j){b.classList.toggle('active',j===i);});};
    catsEl.appendChild(btn);
  });
  buildEmojiGrid();
}

function buildEmojiGrid(emojis){
  var gridEl=document.getElementById('emoji-grid');
  gridEl.innerHTML='';
  var list=emojis||EMOJI_CATS[currentEmojiCat].emojis;
  list.forEach(function(e){
    var span=document.createElement('span');
    span.textContent=e;
    span.onclick=function(){insertEmoji(e);};
    gridEl.appendChild(span);
  });
}

function searchEmoji(q){
  if(!q){buildEmojiGrid();return;}
  var all=[];EMOJI_CATS.forEach(function(c){all=all.concat(c.emojis);});
  buildEmojiGrid(all.filter(function(e){return e.includes(q);}));
}

function toggleEmojiPicker(e){
  e.stopPropagation();
  var picker=document.getElementById('emoji-picker');
  var wasHidden=picker.classList.contains('hidden');
  picker.classList.toggle('hidden');
  if(wasHidden){
    buildEmojiPicker();
    document.getElementById('emoji-search').value='';
    var bar=document.querySelector('.message-bar');
    var rect=bar.getBoundingClientRect();
    var pickerH=340;
    picker.style.top=Math.max(4,rect.top-pickerH-6)+'px';
    picker.style.left=Math.max(4,rect.left+50)+'px';
    picker.style.bottom='auto';
  }
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#emoji-picker')&&!e.target.classList.contains('btn-emoji')){
    document.getElementById('emoji-picker').classList.add('hidden');
  }
});
function insertEmoji(emoji){
  var input=document.getElementById('msg-input');
  var pos=input.selectionStart||input.value.length;
  input.value=input.value.slice(0,pos)+emoji+input.value.slice(pos);
  input.focus();
  input.selectionStart=input.selectionEnd=pos+emoji.length;
  document.getElementById('emoji-picker').classList.add('hidden');
}

// в”Җв”Җв”Җ Connect в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function connect(){
  var socket=new SockJS('/ws');
  stompClient=Stomp.over(socket);
  stompClient.debug=null;
  stompClient.connect({},function(){
    stompClient.subscribe('/user/queue/private',function(m){handleMessage(JSON.parse(m.body));});
    stompClient.subscribe('/user/queue/receipts',function(m){handleReceipt(JSON.parse(m.body));});
    stompClient.subscribe('/topic/users',function(m){updateOnlineUsers(JSON.parse(m.body).content);});
    stompClient.subscribe('/user/queue/call',function(m){handleCallSignal(JSON.parse(m.body));});
    stompClient.send('/app/chat.join',{},JSON.stringify({type:'LOGIN',sender:currentUser.username,receiver:null,content:''}));
    loadFriends();
    loadRooms();
  });
}

// в”Җв”Җв”Җ Friends в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadFriends(){
  var res=await fetch('/api/users/'+currentUser.username+'/friends');
  var friends=await res.json();
  myFriends=friends.map(function(f){return f.username;});
  renderFriendList();
}

function updateOnlineUsers(csv){
  onlineSet=new Set(csv?csv.split(',').filter(function(u){return u;}):[]);
  renderFriendList();
}

function renderFriendList(){
  var list=document.getElementById('user-list');
  list.innerHTML='';
  if(myFriends.length===0){
    var empty=document.createElement('li');
    empty.style.cssText='color:var(--text-muted);font-size:.82rem;font-style:italic;cursor:default;pointer-events:none;padding:.6rem 1rem;display:block';
    empty.textContent='No friends yet вҖ” press + to add';
    list.appendChild(empty);
    return;
  }
  var sorted=myFriends.slice().sort(function(a,b){return (onlineSet.has(b)?1:0)-(onlineSet.has(a)?1:0);});
  sorted.forEach(function(username){
    var isOnline=onlineSet.has(username);
    var isActive=chatMode==='private:'+username;
    var unread=unreadCounts['private:'+username]||0;
    var lastMsg=lastMessages['private:'+username]||'';
    var isTyping=typingTimers[username]&&typingTimers[username].showing;
    var li=document.createElement('li');
    li.className='friend-item'+(isActive?' active-target':'')+(isOnline?'':' friend-offline');
    li.innerHTML=
      '<div class="friend-avatar-wrap">'+
        avatarHtml(username,'36px')+
        '<span class="status-dot '+(isOnline?'dot-on':'dot-off')+'"></span>'+
      '</div>'+
      '<div class="friend-info">'+
        '<div class="friend-name-row">'+
          '<span class="user-name">'+esc(username)+'</span>'+
          (unread>0?'<span class="badge">'+unread+'</span>':'')+
        '</div>'+
        '<div class="friend-preview">'+(isTyping?'<em style="color:#22c55e;font-style:italic">typing\u2026</em>':esc(lastMsg))+'</div>'+
      '</div>'+
      (isOnline?
        '<div class="call-btns">'+
          '<button title="Voice" onclick="event.stopPropagation();startCall(\''+esc(username)+'\',false)">рҹ“һ</button>'+
          '<button title="Video" onclick="event.stopPropagation();startCall(\''+esc(username)+'\',true)">рҹҺҘ</button>'+
        '</div>':''
      );
    li.onclick=function(){setPrivateChat(username);};
    list.appendChild(li);
  });
}

// в”Җв”Җв”Җ Add Friend with search в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showAddFriend(){
  document.getElementById('add-friend-modal').classList.remove('hidden');
  document.getElementById('add-friend-input').value='';
  document.getElementById('add-friend-error').textContent='';
  document.getElementById('user-search-results').innerHTML='';
}
function hideAddFriend(){document.getElementById('add-friend-modal').classList.add('hidden');}

var searchTimeout=null;
function searchUsers(q){
  clearTimeout(searchTimeout);
  var results=document.getElementById('user-search-results');
  if(!q){results.innerHTML='';return;}
  searchTimeout=setTimeout(async function(){
    try{
      var res=await fetch('/api/users/search?q='+encodeURIComponent(q));
      if(!res.ok){results.innerHTML='';return;}
      var users=await res.json();
      results.innerHTML='';
      var filtered=users.filter(function(u){return u.username!==currentUser.username;});
      filtered.forEach(function(u){
        var div=document.createElement('div');
        div.className='search-result-item';
        div.innerHTML=avatarHtml(u.username,'28px')+'<span>'+esc(u.username)+'</span>';
        div.onclick=function(){document.getElementById('add-friend-input').value=u.username;results.innerHTML='';};
        results.appendChild(div);
      });
      if(filtered.length===0){results.innerHTML='<div style="color:var(--text-muted);font-size:.82rem;padding:6px 0">No users found</div>';}
    }catch(ex){results.innerHTML='';}
  },300);
}

async function addFriend(){
  var friendUsername=document.getElementById('add-friend-input').value.trim();
  var err=document.getElementById('add-friend-error');
  if(!friendUsername){err.textContent='Enter a username.';return;}
  if(friendUsername===currentUser.username){err.textContent='You cannot add yourself.';return;}
  err.textContent='';
  var res=await fetch('/api/users/'+currentUser.username+'/friends',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({friendUsername:friendUsername})});
  if(res.ok){hideAddFriend();await loadFriends();}
  else{var d=await res.json();err.textContent=d.error||'User not found.';}
}

// в”Җв”Җв”Җ Typing indicator в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
var typingCooldown=false;
function onTyping(){
  if(!chatMode.startsWith('private:')||typingCooldown||!stompClient)return;
  typingCooldown=true;
  var target=chatMode.split(':')[1];
  stompClient.send('/app/chat.typing',{},JSON.stringify({type:'TYPING',sender:currentUser.username,receiver:target,content:''}));
  setTimeout(function(){typingCooldown=false;},2000);
}

function showTypingIndicator(sender){
  if(chatMode!=='private:'+sender)return;
  var el=document.getElementById('typing-indicator');
  el.textContent=sender+' is typing\u2026';
  el.classList.remove('hidden');
  if(typingTimers[sender])clearTimeout(typingTimers[sender].timer);
  typingTimers[sender]={showing:true,timer:setTimeout(function(){
    typingTimers[sender].showing=false;
    el.classList.add('hidden');
    renderFriendList();
  },3000)};
  renderFriendList();
}

// в”Җв”Җв”Җ Messaging в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function sendMessage(e){
  e.preventDefault();
  var content=document.getElementById('msg-input').value.trim();
  if(!content||!stompClient||chatMode==='')return;
  document.getElementById('msg-input').value='';
  if(chatMode.startsWith('private:')){
    var target=chatMode.split(':')[1];
    stompClient.send('/app/chat.sendPrivate',{},JSON.stringify({type:'PRIVATE_MESSAGE',sender:currentUser.username,receiver:target,content:content}));
    updateLastMsg(chatMode,content);
  }else if(chatMode.startsWith('room:')){
    var parts=chatMode.split(':');
    stompClient.send('/app/chat.sendRoom',{},JSON.stringify({type:'ROOM_MESSAGE',sender:currentUser.username,receiver:null,roomId:parts[1],content:content}));
  }
}

function handleMessage(msg){
  if(msg.type==='USER_LIST'){updateOnlineUsers(msg.content);return;}
  if(msg.type==='TYPING'){showTypingIndicator(msg.sender);return;}
  var convKey='';
  if(msg.type==='PRIVATE_MESSAGE'){
    convKey=msg.sender===currentUser.username?'private:'+msg.receiver:'private:'+msg.sender;
  }else if(msg.type==='ROOM_MESSAGE'&&msg.roomId){
    convKey='room:'+msg.roomId;
  }
  if(convKey&&msg.content){
    updateLastMsg(convKey,msg.content);
  }
  if(convKey&&convKey!==chatMode&&msg.sender!==currentUser.username){
    unreadCounts[convKey]=(unreadCounts[convKey]||0)+1;
    renderFriendList();
    loadRooms();
  }
  if(convKey===chatMode||msg.sender===currentUser.username){
    displayMessage(msg);
  }
  if(msg.id&&msg.sender!==currentUser.username){
    stompClient.send('/app/chat.read',{},JSON.stringify({id:msg.id,type:'READ_RECEIPT',sender:currentUser.username,receiver:msg.sender,content:msg.id}));
  }
}

function updateLastMsg(convKey,content){
  var preview=content.startsWith('data:image/')?'рҹ“· Photo':content;
  lastMessages[convKey]=preview.length>30?preview.slice(0,30)+'\u2026':preview;
  renderFriendList();
}

function handleReceipt(msg){
  var el=document.querySelector('[data-msg-id="'+msg.content+'"] .read-receipt');
  if(el){el.textContent='вң“вң“';el.classList.add('seen');}
}

// в”Җв”Җв”Җ Image sharing в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function sendImage(input){
  if(!input.files||!input.files[0]||chatMode==='')return;
  var file=input.files[0];
  if(file.size>2*1024*1024){alert('Image must be under 2 MB');input.value='';return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result;
    if(chatMode.startsWith('private:')){
      var target=chatMode.split(':')[1];
      stompClient.send('/app/chat.sendPrivate',{},JSON.stringify({type:'PRIVATE_MESSAGE',sender:currentUser.username,receiver:target,content:b64}));
      updateLastMsg(chatMode,'рҹ“· Photo');
    }else if(chatMode.startsWith('room:')){
      var parts=chatMode.split(':');
      stompClient.send('/app/chat.sendRoom',{},JSON.stringify({type:'ROOM_MESSAGE',sender:currentUser.username,receiver:null,roomId:parts[1],content:b64}));
    }
  };
  reader.readAsDataURL(file);
  input.value='';
}

// в”Җв”Җв”Җ History в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadHistory(type,param){
  var url;
  if(type==='private') url='/api/messages/private?user1='+encodeURIComponent(currentUser.username)+'&user2='+encodeURIComponent(param);
  else if(type==='room') url='/api/messages/room/'+param;
  else return;
  try{
    var res=await fetch(url);
    var msgs=await res.json();
    msgs.forEach(function(m){displayMessage(m);});
    if(msgs.length>0){
      var last=msgs[msgs.length-1];
      updateLastMsg(chatMode,last.content||'');
    }
  }catch(ex){}
}

// в”Җв”Җв”Җ Display в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function formatTime(ts){
  if(!ts)return'';
  try{
    var d=new Date(ts);
    var now=new Date();
    var isToday=d.toDateString()===now.toDateString();
    if(isToday)return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }catch(ex){return'';}
}

function displayMessage(msg){
  var messages=document.getElementById('messages');
  var isMine=msg.sender===currentUser.username;
  var isSystem=msg.sender==='System';
  var isPrivate=msg.type==='PRIVATE_MESSAGE';
  var isImage=msg.content&&msg.content.startsWith('data:image/');
  var wrap=document.createElement('div');
  wrap.classList.add('msg-wrap',isMine?'mine':'theirs');
  if(msg.id)wrap.dataset.msgId=msg.id;
  if(isSystem){
    wrap.innerHTML='<span class="msg-system">'+esc(msg.content)+'</span>';
  }else{
    var label='';
    if(!isMine)label=isPrivate?esc(msg.sender)+' \u2192 You':esc(msg.sender);
    else if(isPrivate)label='You \u2192 '+esc(msg.receiver);
    var contentHtml=isImage
      ?'<img src="'+msg.content+'" class="msg-image" onclick="viewImage(this.src)"/>'
      :esc(msg.content);
    var time=formatTime(msg.timestamp||msg.sentAt||null);
    var bubbleHover=msg.id?' onmouseenter="showReactionPicker(event,\''+msg.id+'\')"':'';
    var metaTheirs=time?'<div class="msg-meta"><span class="msg-time">'+time+'</span></div>':'';
    var metaMine='<div class="msg-meta">'+(time?'<span class="msg-time">'+time+'</span>':'')+(msg.id?'<span class="read-receipt">\u2713</span>':'')+'</div>';
    if(!isMine){
      wrap.innerHTML=
        '<div style="display:flex;align-items:flex-end;gap:6px">'+
          avatarHtml(msg.sender,'28px')+
          '<div style="display:flex;flex-direction:column;max-width:100%">'+
            (label?'<span class="msg-sender">'+label+'</span>':'')+
            '<span class="msg-bubble msg-theirs'+(isPrivate?' msg-private':'')+'"'+bubbleHover+'>'+contentHtml+'</span>'+
            metaTheirs+
          '</div>'+
        '</div>';
    }else{
      wrap.innerHTML=
        '<div style="display:flex;flex-direction:column;align-items:flex-end">'+
          (label?'<span class="msg-sender">'+label+'</span>':'')+
          '<span class="msg-bubble msg-mine"'+bubbleHover+'>'+contentHtml+'</span>'+
          metaMine+
        '</div>';
    }
  }
  messages.appendChild(wrap);
  messages.scrollTop=messages.scrollHeight;
}

// в”Җв”Җв”Җ Reactions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showReactionPicker(e,msgId){
  currentReactMsgId=msgId;
  var picker=document.getElementById('reaction-picker');
  picker.classList.remove('hidden');
  var rect=e.target.getBoundingClientRect();
  picker.style.top=Math.max(0,rect.top-52)+'px';
  picker.style.left=rect.left+'px';
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#reaction-picker')&&!e.target.closest('.msg-bubble')){
    document.getElementById('reaction-picker').classList.add('hidden');
  }
});
function reactTo(emoji){
  document.getElementById('reaction-picker').classList.add('hidden');
  if(!currentReactMsgId)return;
  var wrap=document.querySelector('[data-msg-id="'+currentReactMsgId+'"]');
  if(wrap){
    var existing=wrap.querySelector('.reactions');
    if(!existing){existing=document.createElement('div');existing.className='reactions';wrap.appendChild(existing);}
    // Find existing badge for this emoji
    var found=Array.from(existing.querySelectorAll('.reaction-badge')).find(function(b){return b.dataset.emoji===emoji;});
    if(found){var cnt=parseInt(found.dataset.count||1)+1;found.dataset.count=cnt;found.textContent=emoji+' '+cnt;}
    else{var span=document.createElement('span');span.className='reaction-badge';span.dataset.emoji=emoji;span.dataset.count=1;span.textContent=emoji+' 1';existing.appendChild(span);}
  }
}

// в”Җв”Җв”Җ Image viewer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function viewImage(src){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;cursor:zoom-out';
  var img=document.createElement('img');
  img.src=src;
  img.style.cssText='max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.5)';
  ov.appendChild(img);
  ov.onclick=function(){document.body.removeChild(ov);};
  document.body.appendChild(ov);
}

// в”Җв”Җв”Җ Chat mode в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setPrivateChat(username){
  if(chatMode==='private:'+username){
    chatMode='';
    document.getElementById('chat-header-name').textContent='Select a conversation';
    document.getElementById('chat-header-status').textContent='';
    document.getElementById('messages').innerHTML='';
    document.getElementById('typing-indicator').classList.add('hidden');
  }else{
    chatMode='private:'+username;
    unreadCounts['private:'+username]=0;
    document.getElementById('chat-header-name').textContent='@'+username;
    document.getElementById('chat-header-status').textContent=onlineSet.has(username)?'\u25cf Online':'';
    document.getElementById('messages').innerHTML='';
    document.getElementById('typing-indicator').classList.add('hidden');
    loadHistory('private',username);
  }
  renderFriendList();
  document.querySelectorAll('#room-list li').forEach(function(li){li.classList.remove('active-target');});
}

// в”Җв”Җв”Җ Rooms в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadRooms(){
  var res=await fetch('/api/rooms');
  var rooms=await res.json();
  var list=document.getElementById('room-list');
  list.innerHTML='';
  rooms.forEach(function(room){
    var unread=unreadCounts['room:'+room.id]||0;
    var lastMsg=lastMessages['room:'+room.id]||'';
    var isActive=chatMode.startsWith('room:'+room.id+':');
    var li=document.createElement('li');
    li.className='friend-item'+(isActive?' active-target':'');
    li.innerHTML=
      '<div class="friend-avatar-wrap">'+
        '<div class="avatar" style="background:var(--primary);width:36px;height:36px;font-size:16px">#</div>'+
      '</div>'+
      '<div class="friend-info">'+
        '<div class="friend-name-row">'+
          '<span class="user-name">'+esc(room.name)+'</span>'+
          (unread>0?'<span class="badge">'+unread+'</span>':'')+
        '</div>'+
        '<div class="friend-preview">'+esc(lastMsg)+'</div>'+
      '</div>';
    li.onclick=function(){joinAndOpenRoom(room.id,room.name);};
    list.appendChild(li);
    if(stompClient)subscribeRoom(room.id);
  });
}

function subscribeRoom(roomId){
  if(roomSubscriptions[roomId])return;
  roomSubscriptions[roomId]=stompClient.subscribe('/topic/room/'+roomId,function(m){handleMessage(JSON.parse(m.body));});
}

async function joinAndOpenRoom(roomId,roomName){
  await fetch('/api/rooms/'+roomId+'/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username})});
  subscribeRoom(roomId);
  chatMode='room:'+roomId+':'+roomName;
  unreadCounts['room:'+roomId]=0;
  document.getElementById('chat-header-name').textContent='# '+roomName;
  document.getElementById('chat-header-status').textContent='';
  document.getElementById('messages').innerHTML='';
  document.getElementById('typing-indicator').classList.add('hidden');
  loadHistory('room',roomId);
  renderFriendList();
  loadRooms();
}

function showCreateRoom(){
  var fl=document.getElementById('room-friends-list');
  fl.innerHTML='';
  if(myFriends.length===0){
    fl.innerHTML='<span style="color:var(--text-muted);font-size:.82rem;font-style:italic">No friends yet</span>';
  }else{
    myFriends.forEach(function(u){
      var label=document.createElement('label');
      label.style.cssText='display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:.88rem';
      label.innerHTML='<input type="checkbox" value="'+esc(u)+'"> '+avatarHtml(u,'22px')+' '+esc(u);
      fl.appendChild(label);
    });
  }
  document.getElementById('room-name').value='';
  document.getElementById('room-error').textContent='';
  document.getElementById('room-modal').classList.remove('hidden');
}
function hideCreateRoom(){document.getElementById('room-modal').classList.add('hidden');}

async function createRoom(){
  var name=document.getElementById('room-name').value.trim();
  var err=document.getElementById('room-error');
  if(!name){err.textContent='Chat name is required.';return;}
  err.textContent='';
  var res=await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,description:'',username:currentUser.username})});
  if(!res.ok){var d=await res.json();err.textContent=d.error||'Failed.';return;}
  var room=await res.json();
  var checked=Array.from(document.querySelectorAll('#room-friends-list input[type=checkbox]:checked')).map(function(cb){return cb.value;});
  await Promise.all(checked.map(function(u){
    return fetch('/api/rooms/'+room.id+'/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
  }));
  hideCreateRoom();
  loadRooms();
}

// в”Җв”Җв”Җ Calls в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function startCall(target,withVideo){
  callTarget=target;
  localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:withVideo});
  document.getElementById('local-video').srcObject=localStream;
  peerConn=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(function(t){peerConn.addTrack(t,localStream);});
  peerConn.ontrack=function(e){document.getElementById('remote-video').srcObject=e.streams[0];};
  peerConn.onicecandidate=function(e){if(e.candidate)stompClient.send('/app/call.ice',{},JSON.stringify({type:'CALL_ICE',sender:currentUser.username,receiver:target,content:JSON.stringify(e.candidate)}));};
  var offer=await peerConn.createOffer();
  await peerConn.setLocalDescription(offer);
  stompClient.send('/app/call.offer',{},JSON.stringify({type:'CALL_OFFER',sender:currentUser.username,receiver:target,content:JSON.stringify({sdp:offer,withVideo:withVideo})}));
  document.getElementById('call-with-label').textContent=(withVideo?'Video':'Voice')+' call with '+target;
  document.getElementById('call-screen').classList.remove('hidden');
}

async function handleCallSignal(msg){
  if(msg.type==='CALL_OFFER'){incomingOffer=msg;document.getElementById('call-name').textContent=msg.sender;document.getElementById('call-avatar').textContent=msg.sender[0].toUpperCase();document.getElementById('call-overlay').classList.remove('hidden');}
  else if(msg.type==='CALL_ANSWER'){var d=JSON.parse(msg.content);await peerConn.setRemoteDescription(new RTCSessionDescription(d.sdp));}
  else if(msg.type==='CALL_ICE'){if(peerConn)await peerConn.addIceCandidate(new RTCIceCandidate(JSON.parse(msg.content)));}
  else if(msg.type==='CALL_END'||msg.type==='CALL_REJECT'){endCallCleanup();}
}

async function acceptCall(){
  document.getElementById('call-overlay').classList.add('hidden');
  var d=JSON.parse(incomingOffer.content);callTarget=incomingOffer.sender;
  localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:d.withVideo});
  document.getElementById('local-video').srcObject=localStream;
  peerConn=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(function(t){peerConn.addTrack(t,localStream);});
  peerConn.ontrack=function(e){document.getElementById('remote-video').srcObject=e.streams[0];};
  peerConn.onicecandidate=function(e){if(e.candidate)stompClient.send('/app/call.ice',{},JSON.stringify({type:'CALL_ICE',sender:currentUser.username,receiver:callTarget,content:JSON.stringify(e.candidate)}));};
  await peerConn.setRemoteDescription(new RTCSessionDescription(d.sdp));
  var answer=await peerConn.createAnswer();
  await peerConn.setLocalDescription(answer);
  stompClient.send('/app/call.answer',{},JSON.stringify({type:'CALL_ANSWER',sender:currentUser.username,receiver:callTarget,content:JSON.stringify({sdp:answer})}));
  document.getElementById('call-with-label').textContent=(d.withVideo?'Video':'Voice')+' call with '+callTarget;
  document.getElementById('call-screen').classList.remove('hidden');
}

function rejectCall(){stompClient.send('/app/call.end',{},JSON.stringify({type:'CALL_REJECT',sender:currentUser.username,receiver:incomingOffer.sender,content:''}));document.getElementById('call-overlay').classList.add('hidden');incomingOffer=null;}
function hangUp(){stompClient.send('/app/call.end',{},JSON.stringify({type:'CALL_END',sender:currentUser.username,receiver:callTarget,content:''}));endCallCleanup();}

async function toggleScreenShare(){
  if(!peerConn)return;
  if(screenStream){
    screenStream.getTracks().forEach(function(t){t.stop();});screenStream=null;
    var vs=peerConn.getSenders().find(function(s){return s.track&&s.track.kind==='video';});
    if(vs&&localStream){var ct=localStream.getVideoTracks()[0];if(ct)vs.replaceTrack(ct);}
    return;
  }
  try{
    screenStream=await navigator.mediaDevices.getDisplayMedia({video:true});
    var st=screenStream.getVideoTracks()[0];
    var vs=peerConn.getSenders().find(function(s){return s.track&&s.track.kind==='video';});
    if(vs)vs.replaceTrack(st);
    st.onended=function(){toggleScreenShare();};
  }catch(ex){}
}

function endCallCleanup(){
  if(localStream){localStream.getTracks().forEach(function(t){t.stop();});}
  if(screenStream){screenStream.getTracks().forEach(function(t){t.stop();});screenStream=null;}
  localStream=null;if(peerConn)peerConn.close();peerConn=null;callTarget=null;incomingOffer=null;
  document.getElementById('call-screen').classList.add('hidden');
  document.getElementById('call-overlay').classList.add('hidden');
  document.getElementById('remote-video').srcObject=null;
  document.getElementById('local-video').srcObject=null;
}
function toggleMute(){if(!localStream)return;localStream.getAudioTracks().forEach(function(t){t.enabled=!t.enabled;});}
function toggleCamera(){if(!localStream)return;localStream.getVideoTracks().forEach(function(t){t.enabled=!t.enabled;});}

// в”Җв”Җв”Җ Logout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function logout(){
  if(stompClient){stompClient.send('/app/chat.leave',{},JSON.stringify({type:'LOGOUT',sender:currentUser.username,receiver:null,content:''}));stompClient.disconnect();}
  await fetch('/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username})});
  sessionStorage.removeItem('user');window.location.href='index.html';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
connect();
