# Server port
server.port=8080

# MySQL datasource
# Change host/port/dbname/username/password to match your local or university MySQL server
spring.datasource.url=jdbc:mysql://localhost:3306/chitchat?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false
# Dialect is auto-detected — no need to set manually

# Serve static files (web frontend) from src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/
